<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ ticker }} - Stock Analysis</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f1419; color: #e7e9ea; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border-radius: 10px; margin-bottom: 30px; }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #cbd5e1; font-size: 1.1em; }
        .chart-container { background: #1a1f2e; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; }
        #news-panel { background: #1a1f2e; border-radius: 10px; padding: 20px; max-height: 600px; overflow-y: auto; }
        .news-item { background: #252d3d; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #3b82f6; }
        .news-date { color: #60a5fa; font-weight: bold; margin-bottom: 10px; font-size: 1.1em; }
        .news-title { color: #e7e9ea; margin: 5px 0; font-size: 0.95em; }
        .news-meta { color: #94a3b8; font-size: 0.85em; margin-top: 5px; }
        .legend { background: #252d3d; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .legend-item { display: inline-block; margin-right: 20px; color: #cbd5e1; font-size: 0.95em; }
        .legend-marker { display: inline-block; width: 20px; height: 3px; background: #ef4444; margin-right: 5px; vertical-align: middle; }
        .legend-tip { color: #94a3b8; font-size: 0.9em; margin-top: 10px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1f2e; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        .news-popup {
            position: fixed;
            background: #1a1f2e;
            border: 2px solid #3b82f6;
            border-radius: 8px;
            padding: 15px;
            max-width: 450px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 10000;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            display: none;
            pointer-events: all;
        }
        .news-popup-title {
            color: #60a5fa;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1em;
            border-bottom: 1px solid #3b82f6;
            padding-bottom: 5px;
        }
        .news-popup-item {
            margin: 8px 0;
            padding: 8px;
            background: #252d3d;
            border-radius: 4px;
        }
        .news-popup-item a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.9em;
            pointer-events: all;
        }
        .news-popup-item a:hover {
            text-decoration: underline;
        }
        .news-popup-meta {
            color: #94a3b8;
            font-size: 0.8em;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 {{ ticker }}</h1>
            <p class="subtitle">Stock Price Analysis with News Events</p>
        </header>

        <div class="legend">
            <div class="legend-item">
                <span class="legend-marker" style="background: #3b82f6; width: 10px; height: 10px; border-radius: 50%;"></span>
                <span>Blue dots below chart indicate news articles (hover to view details)</span>
            </div>
            <div class="legend-tip">💡 Use mouse scroll to zoom in/out | Click and drag to pan | Double-click to reset</div>
        </div>

        <div class="chart-container">
            <div id="candlestick-chart"></div>
        </div>
        
        <div id="news-popup" class="news-popup"></div>

        <div id="news-panel"></div>
    </div>

    <script>
        fetch('/api/data')
            .then(res => res.json())
            .then(result => {
                const data = result.data;
                const news = result.news;

                const candlestick = {
                    x: data.map(d => d.date),
                    open: data.map(d => d.open),
                    high: data.map(d => d.high),
                    low: data.map(d => d.low),
                    close: data.map(d => d.close),
                    type: 'candlestick',
                    name: 'Price',
                    yaxis: 'y2',
                    increasing: {line: {color: '#10b981'}},
                    decreasing: {line: {color: '#ef4444'}}
                };

                const volume = {
                    x: data.map(d => d.date),
                    y: data.map(d => d.volume),
                    type: 'bar',
                    name: 'Volume',
                    yaxis: 'y',
                    marker: { color: '#3b82f6', opacity: 0.3 }
                };

                // Create news markers as scatter traces
                const newsTraces = [];
                const newsDateMap = {};
                let maxNewsCount = 0;
                
                data.filter(d => d.hasNews).forEach(d => {
                    const newsCount = Math.min(d.newsCount, 5);
                    maxNewsCount = Math.max(maxNewsCount, newsCount);
                    for (let i = 0; i < newsCount; i++) {
                        newsTraces.push({
                            x: d.date,
                            y: i + 1,
                            newsCount: d.newsCount,
                            date: d.date
                        });
                    }
                    newsDateMap[d.date] = d.newsCount;
                });

                const newsScatter = {
                    x: newsTraces.map(t => t.x),
                    y: newsTraces.map(t => t.y),
                    mode: 'markers',
                    type: 'scatter',
                    name: 'News',
                    yaxis: 'y3',
                    marker: {
                        color: '#3b82f6',
                        size: 10,
                        symbol: 'circle'
                    },
                    hoverinfo: 'none',
                    customdata: newsTraces.map(t => ({ date: t.date, count: t.newsCount }))
                };

                const candleLayout = {
                    title: 'Price Chart with Volume',
                    xaxis: { 
                        rangeslider: { visible: false }, 
                        color: '#94a3b8',
                        type: 'date'
                    },
                    yaxis: {
                        title: 'Volume (M)',
                        color: '#94a3b8',
                        domain: [0.1, 0.25],
                        showgrid: false
                    },
                    yaxis2: {
                        title: 'Price ($)',
                        color: '#94a3b8',
                        domain: [0.3, 1],
                        side: 'right'
                    },
                    yaxis3: {
                        domain: [0, 0.09],
                        showgrid: false,
                        showticklabels: false,
                        zeroline: false,
                        fixedrange: true
                    },
                    paper_bgcolor: '#1a1f2e',
                    plot_bgcolor: '#0f1419',
                    font: { color: '#e7e9ea' },
                    height: 750,
                    hovermode: 'closest',
                    dragmode: 'pan',
                    showlegend: true,
                    legend: {
                        x: 0,
                        y: 1,
                        bgcolor: 'rgba(37, 45, 61, 0.8)'
                    }
                };

                const config = {
                    scrollZoom: true,
                    displayModeBar: true,
                    modeBarButtonsToRemove: ['lasso2d', 'select2d'],
                    displaylogo: false
                };

                Plotly.newPlot('candlestick-chart', [volume, candlestick, newsScatter], candleLayout, config);

                const chartDiv = document.getElementById('candlestick-chart');
                const popup = document.getElementById('news-popup');
                let currentHoverDate = null;

                chartDiv.on('plotly_hover', function(eventData) {
                    const point = eventData.points[0];
                    if (point.data.name === 'News') {
                        const date = point.x;
                        currentHoverDate = date;
                        const articles = news[date];
                        
                        if (articles) {
                            let popupHTML = `<div class="news-popup-title">${date} - ${articles.length} Articles</div>`;
                            articles.forEach(article => {
                                popupHTML += `
                                    <div class="news-popup-item">
                                        <a href="${article.link}" target="_blank">${article.title}</a>
                                        <div class="news-popup-meta">${article.source} | ${article.time}</div>
                                    </div>
                                `;
                            });
                            
                            popup.innerHTML = popupHTML;
                            popup.style.display = 'block';
                            
                            const viewportWidth = window.innerWidth;
                            const viewportHeight = window.innerHeight;
                            
                            popup.style.visibility = 'hidden';
                            popup.style.display = 'block';
                            const popupRect = popup.getBoundingClientRect();
                            popup.style.visibility = 'visible';
                            
                            let left = eventData.event.clientX;
                            let top = eventData.event.clientY - popupRect.height - 10;
                            
                            if (left + popupRect.width > viewportWidth - 20) {
                                left = viewportWidth - popupRect.width - 20;
                            }
                            if (left < 10) {
                                left = 10;
                            }
                            
                            if (top < 10) {
                                top = eventData.event.clientY + 10;
                            }
                            
                            popup.style.left = left + 'px';
                            popup.style.top = top + 'px';
                        }
                    }
                });

                chartDiv.on('plotly_unhover', function(eventData) {
                    setTimeout(() => {
                        if (!popup.matches(':hover')) {
                            popup.style.display = 'none';
                            currentHoverDate = null;
                        }
                    }, 200);
                });
                
                popup.addEventListener('mouseenter', function() {
                    popup.style.display = 'block';
                });
                
                popup.addEventListener('mouseleave', function() {
                    popup.style.display = 'none';
                    currentHoverDate = null;
                });

                chartDiv.on('plotly_relayout', function() {
                    if (!popup.matches(':hover')) {
                        popup.style.display = 'none';
                        currentHoverDate = null;
                    }
                });

                const newsPanel = document.getElementById('news-panel');
                const sortedDates = Object.keys(news).sort().reverse();
                
                sortedDates.forEach(date => {
                    const articles = news[date];
                    const dateDiv = document.createElement('div');
                    dateDiv.className = 'news-item';
                    dateDiv.innerHTML = `<div class="news-date">${date} (${articles.length} articles)</div>`;
                    
                    articles.forEach(article => {
                        const titleDiv = document.createElement('div');
                        titleDiv.className = 'news-title';
                        titleDiv.innerHTML = `• <a href="${article.link}" target="_blank" style="color: #60a5fa; text-decoration: none;">${article.title}</a>`;
                        const metaDiv = document.createElement('div');
                        metaDiv.className = 'news-meta';
                        metaDiv.textContent = `${article.source} | ${article.time}`;
                        dateDiv.appendChild(titleDiv);
                        dateDiv.appendChild(metaDiv);
                    });
                    
                    newsPanel.appendChild(dateDiv);
                });
            });
    </script>
</body>
</html>
